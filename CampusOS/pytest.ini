[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = tests/*.py tests/**/*.py
python_classes = Test*
python_functions = test_*
addopts =
    --reuse-db
    --cov=apps
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --tb=short
    -q
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
