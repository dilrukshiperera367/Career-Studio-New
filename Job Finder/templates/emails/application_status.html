<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Application Update</title></head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
  <div style="text-align: center; margin-bottom: 30px;">
    <h1 style="color: #2563eb;">JobFinder.lk</h1>
  </div>
  <h2>Application Status Update</h2>
  <p>Your application status has been updated:</p>
  <div style="background-color: #f8fafc; padding: 15px; border-radius: 8px; margin: 20px 0;">
    <h3 style="margin: 0 0 5px;">{{ job.title_en }}</h3>
    <p style="margin: 0; color: #666;">Company: {{ company_name }}</p>
    <p style="margin: 5px 0 0; font-weight: bold; color: #2563eb;">Status: {{ new_status|title }}</p>
  </div>
  <p>Log in to your dashboard for more details.</p>
  <hr style="border: none; border-top: 1px solid #eee; margin: 30px 0;">
  <p style="color: #999; font-size: 12px;">This email was sent by JobFinder.lk.</p>
</body>
</html>
