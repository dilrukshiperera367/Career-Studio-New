<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block subject %}ConnectOS{% endblock %}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; margin: 0; padding: 0; }
    .wrapper { max-width: 600px; margin: 40px auto; background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .header { background: #4f46e5; padding: 32px 40px; }
    .header h1 { color: #ffffff; margin: 0; font-size: 24px; font-weight: 700; }
    .header p { color: rgba(255,255,255,0.8); margin: 4px 0 0; font-size: 14px; }
    .body { padding: 40px; color: #374151; }
    .body h2 { color: #111827; font-size: 20px; margin: 0 0 16px; }
    .body p { line-height: 1.6; margin: 0 0 16px; }
    .btn { display: inline-block; padding: 12px 24px; background: #4f46e5; color: #ffffff !important; text-decoration: none; border-radius: 6px; font-weight: 600; font-size: 14px; }
    .btn-warning { background: #f59e0b; }
    .btn-danger { background: #ef4444; }
    .alert { padding: 16px; border-radius: 6px; margin: 16px 0; }
    .alert-warning { background: #fffbeb; border-left: 4px solid #f59e0b; color: #92400e; }
    .alert-danger { background: #fef2f2; border-left: 4px solid #ef4444; color: #991b1b; }
    .footer { background: #f9fafb; padding: 24px 40px; border-top: 1px solid #e5e7eb; color: #6b7280; font-size: 13px; }
    .footer a { color: #4f46e5; text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>ConnectOS</h1>
      <p>Intelligent HR &amp; Recruitment Platform</p>
    </div>
    <div class="body">
      {% block content %}{% endblock %}
    </div>
    <div class="footer">
      <p>You're receiving this email because you have an account on ConnectOS.<br>
      <a href="#">Unsubscribe</a> &bull; <a href="#">Privacy Policy</a> &bull; <a href="#">Terms of Service</a></p>
      <p>&copy; 2025 ConnectOS. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
